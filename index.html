<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotC 실시간 투표 시스템1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #18181b; color: #f4f4f5; user-select: none; -webkit-user-select: none; }
        .hidden { display: none !important; }
        .pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{transform: scale(1);} 50%{transform: scale(1.05); box-shadow: 0 0 15px rgba(220,38,38,0.6);} }
        .glass-panel { background: rgba(39, 39, 42, 0.9); backdrop-filter: blur(8px); border: 1px solid #52525b; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); }
        #toast-container { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column-reverse; gap: 10px; pointer-events: none; }
        .toast-item { animation: floatUp 3s ease-out forwards; padding: 12px 24px; border-radius: 999px; font-weight: 900; font-size: 14px; color: white; white-space: nowrap; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        @keyframes floatUp { 0% { transform: translateY(20px); opacity: 0; } 10% { transform: translateY(0); opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
        #modal-role-text { white-space: pre-wrap; word-break: break-word; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #52525b; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex flex-col items-center relative">

<div id="toast-container"></div>

<div id="login-screen" class="w-full max-w-md mt-20 text-center">
    <h1 class="text-4xl font-black text-red-600 mb-2">처형 투표소</h1>
    <input type="text" id="nicknameInput" class="w-full p-4 rounded-xl text-black font-bold text-center mb-4 focus:outline-none focus:ring-4 ring-red-500" placeholder="닉네임">
    <button onclick="join()" class="w-full bg-red-700 hover:bg-red-600 text-white font-bold p-4 rounded-xl shadow-lg transition">입장하기</button>
</div>

<div id="gm-screen" class="hidden w-full max-w-2xl">
    <div class="flex justify-between items-center mb-6 bg-red-900 p-4 rounded-xl">
        <h2 class="text-xl font-black text-white">⚖️ GM 관리자 패널</h2>
        <button onclick="resetGame()" class="text-sm bg-black/50 px-3 py-1 rounded text-red-200">초기화</button>
    </div>

    <div class="bg-zinc-800 p-5 rounded-xl mb-6 shadow-xl border border-zinc-700">
        <div class="flex justify-between items-center mb-4 border-b border-zinc-600 pb-2">
            <h3 class="text-lg font-bold text-gray-200">📜 시나리오 필터링</h3>
            <span id="scenario-status" class="text-xs text-amber-400 font-bold">전체 캐릭터 노출 중</span>
        </div>
        <select id="scenarioSelect" onchange="loadPresetScenario()" class="w-full p-3 rounded-lg text-black font-bold mb-2">
            <option value="">-- 시나리오 선택 (필터링) --</option>
            <option value="trouble_brewing.json">불길한 조짐</option>
            <option value="bad_moon_rising.json">어둠을 부르는 달</option>
            <option value="sects_and_violets.json">점철되는 혼란</option>
        </select>
        <p class="text-[10px] text-gray-500">※ 시나리오를 선택하면 직업 할당 시 해당 캐릭터만 나타납니다.</p>
    </div>

    <div class="bg-zinc-800 p-5 rounded-xl mb-6 border border-zinc-700">
        <h3 class="text-lg font-bold text-gray-200 mb-3">👥 참가자 및 직업 할당</h3>
        <div id="gm-player-list" class="space-y-2"></div>
    </div>

    <div class="bg-zinc-800 p-5 rounded-xl text-center">
        <h3 class="text-lg font-bold text-red-400 mb-3">🔥 처형 투표 개시</h3>
        <div class="flex gap-2 mb-4">
            <select id="nominatorSelect" class="flex-1 p-3 rounded-lg text-black font-bold"><option value="">지명자 없음</option></select>
            <select id="nomineeSelect" class="flex-1 p-3 border-2 border-red-500 rounded-lg text-black font-bold"><option value="">피지명자 선택</option></select>
        </div>
        <button onclick="startVote()" class="w-full bg-red-600 text-white font-black p-4 rounded-xl">투표 시작</button>
    </div>

    <div id="gm-result-panel" class="hidden mt-6 bg-zinc-900 p-6 rounded-xl border border-red-800 text-center">
        <p class="text-3xl font-black text-white mb-2"><span id="gm-yes-count">0</span> 표 (찬성)</p>
        <p class="text-sm text-gray-400">현재 대기: <span id="gm-current-voter" class="text-amber-400 font-bold"></span></p>
        <div id="gm-final-decision" class="hidden mt-4 flex gap-2">
            <button onclick="endVote('proceed')" class="flex-1 bg-red-700 text-white p-3 rounded-lg font-bold">진행 (처형)</button>
            <button onclick="endVote('cancel')" class="flex-1 bg-slate-600 text-white p-3 rounded-lg font-bold">부결</button>
        </div>
    </div>
</div>

<div id="role-select-modal" class="fixed inset-0 z- hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm transition-opacity">
    <div class="bg-zinc-900 border border-zinc-700 rounded-2xl p-6 max-w-2xl w-full flex flex-col max-h-[85vh]">
        <button onclick="closeRoleSelectModal()" class="absolute top-4 right-4 text-gray-500 hover:text-white text-2xl font-black">✕</button>
        <h3 class="text-xl font-black text-white mb-4">직업 할당: <span id="role-select-target" class="text-amber-500"></span></h3>
        <div id="role-grid" class="grid grid-cols-3 md:grid-cols-4 gap-2 overflow-y-auto pr-2 pb-4">
            </div>
    </div>
</div>

<div id="player-screen" class="hidden w-full max-w-md">
    <div class="bg-zinc-800 p-6 rounded-xl shadow-xl text-center border border-zinc-700 mb-6">
        <h2 id="my-name" class="text-3xl font-black text-white mb-4"></h2>
        <div id="role-panel" onmousedown="showRole()" onmouseup="hideRole()" onmouseleave="hideRole()" ontouchstart="showRole()" ontouchend="hideRole()"
             class="glass-panel rounded-2xl p-8 cursor-pointer min-h-[160px] flex flex-col justify-center items-center transition-all duration-300">
            <div id="tap-to-see"><span class="text-4xl mb-2 block">🩸</span><p class="text-gray-300 font-bold text-sm">꾹 누르면 정체가 드러납니다</p></div>
            <div id="role-details" class="hidden w-full">
                <p id="my-role-team" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1"></p>
                <p id="my-role-name" class="text-3xl font-black text-amber-500 mb-4"></p>
                <p id="my-role-ability" class="text-[13px] text-gray-300 bg-black/40 p-4 rounded-xl border border-zinc-600 text-left"></p>
            </div>
        </div>
        <button id="btn-detail-guide" onclick="openAbilityPopup()" class="w-full mt-4 bg-zinc-700 text-amber-400 font-bold py-3 rounded-xl transition-all">📖 내 직업 상세 가이드 읽기</button>
        <div id="my-status" class="mt-4 p-3 rounded-xl bg-green-900 text-green-200 font-bold text-sm">🟢 생존</div>
    </div>

    <div id="vote-area" class="hidden bg-zinc-800 p-6 rounded-xl border-2 border-red-600 text-center">
        <div class="bg-zinc-900 p-3 rounded-lg border border-zinc-700 mb-6 text-sm">
            <span id="vote-nominator-display" class="text-gray-400 font-bold"></span> ➡️ <span id="vote-target" class="text-red-400 font-black"></span>
        </div>
        <div id="vote-wait" class="text-gray-400">대기 중: <b id="current-voter-name" class="text-amber-400"></b></div>
        <div id="vote-action" class="hidden flex flex-col gap-3">
            <button onclick="submitVote('yes')" class="pulse bg-red-600 text-white font-black p-5 rounded-xl text-xl transition">✋ 찬성</button>
            <button onclick="submitVote('pass')" class="bg-slate-600 text-white font-bold p-4 rounded-xl transition">기권</button>
        </div>
        <div id="ghost-action" class="hidden flex flex-col gap-3">
            <button onclick="submitVote('yes', true)" class="bg-red-700 text-white font-black p-4 rounded-xl transition">유령 투표 사용</button>
            <button onclick="submitVote('pass')" class="bg-slate-700 hover:bg-slate-600 text-gray-300 font-bold p-4 rounded-xl transition">아니오</button>
        </div>
    </div>
</div>

<div id="ability-modal" class="fixed inset-0 z- hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm transition-opacity">
    <div class="bg-zinc-900 border border-zinc-700 rounded-2xl p-6 max-w-sm w-full shadow-2xl relative">
        <button onclick="closeAbilityPopup()" class="absolute top-4 right-4 text-gray-500 hover:text-white text-2xl font-black">✕</button>
        <p class="text-xs font-bold text-gray-400 mb-1">직업 상세 정보</p>
        <h3 id="modal-role-name" class="text-2xl font-black text-amber-500 mb-4 border-b border-zinc-700 pb-2"></h3>
        <div id="modal-role-text" class="text-[13px] text-gray-300 leading-relaxed max-h-[60vh] overflow-y-auto pr-2"></div>
        <button onclick="closeAbilityPopup()" class="w-full mt-6 bg-slate-700 text-white font-bold py-3 rounded-xl shadow-lg transition">닫기</button>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyB1Se7KlWdhG3Tg26Q_U4x8jtcbf-rDtgs", authDomain: "botc-helper-ae51e.firebaseapp.com", databaseURL: "https://botc-helper-ae51e-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "botc-helper-ae51e" };
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myNick = "", isGM = false, playersData = {}, votingState = { active: false }, lastToastTs = Date.now(), scenarioRoles = [];
let roleDetailCache = {};

// 직업 사전 (이전 턴의 데이터와 동일)
const ROLE_DICT = {
    "soldier": { name: "군인", team: "마을주민", ability: "악마로부터 안전합니다." },
    "ravenkeeper": { name: "까마귀지기", team: "마을주민", ability: "사망 시 플레이어 1명을 봅니다." },
    "washerwoman": { name: "세탁부", team: "마을주민", ability: "특정 주민 1명을 압니다." },
    "librarian": { name: "사서", team: "마을주민", ability: "특정 외지인 1명을 압니다." },
    "investigator": { name: "수사관", team: "마을주민", ability: "특정 하수인 1명을 압니다." },
    "chef": { name: "요리사", team: "마을주민", ability: "이웃한 악인 쌍의 수를 압니다." },
    "empath": { name: "초공감자", team: "마을주민", ability: "인접한 생존자 중 악인의 수를 압니다." },
    "fortuneteller": { name: "점쟁이", team: "마을주민", ability: "지목한 2명의 악마 여부를 압니다." },
    "undertaker": { name: "장의사", team: "마을주민", ability: "처형된 자의 정체를 압니다." },
    "monk": { name: "수도사", team: "마을주민", ability: "타인을 보호합니다." },
    "virgin": { name: "성결자", team: "마을주민", ability: "지목자가 주민이면 처형합니다." },
    "slayer": { name: "처단자", team: "마을주민", ability: "악마를 죽일 수 있습니다." },
    "mayor": { name: "시장", team: "마을주민", ability: "특수 승리 조건이 있습니다." },
    "saint": { name: "성자", team: "외지인", ability: "처형 시 패배합니다." },
    "recluse": { name: "은둔자", team: "외지인", ability: "악한 팀으로 보일 수 있습니다." },
    "drunk": { name: "주정뱅이", team: "외지인", ability: "능력이 가짜입니다." },
    "butler": { name: "집사", team: "외지인", ability: "주인을 따라 투표합니다." },
    "poisoner": { name: "독살범", team: "하수인", ability: "중독 능력이 있습니다." },
    "spy": { name: "첩자", team: "하수인", ability: "마도서를 봅니다." },
    "scarletwoman": { name: "탕녀", team: "하수인", ability: "악마가 죽으면 계승합니다." },
    "baron": { name: "남작", team: "하수인", ability: "외지인이 늘어납니다." },
    "imp": { name: "임프", team: "악마", ability: "밤마다 살해합니다." },
    // 필요시 다른 캐릭터 추가...
};

window.onload = () => {
    const sn = localStorage.getItem('botc_nick'), sg = localStorage.getItem('botc_isGM');
    if (sg === 'true') { myNick = "GM"; isGM = true; document.getElementById('login-screen').classList.add('hidden'); document.getElementById('gm-screen').classList.remove('hidden'); setupListeners(); }
    else if (sn) { myNick = sn; document.getElementById('login-screen').classList.add('hidden'); document.getElementById('player-screen').classList.remove('hidden'); document.getElementById('my-name').innerText = myNick; setupListeners(); }
};

// --- 시나리오별 필터링 기능의 핵심 ---
async function loadPresetScenario() {
    const f = document.getElementById('scenarioSelect').value;
    if(!f) { scenarioRoles = []; document.getElementById('scenario-status').innerText = `전체 캐릭터 노출 중`; return; }
    try {
        const res = await fetch(`./${f}`);
        if(!res.ok) throw new Error();
        const data = await res.json();
        // 문자열 ID만 필터링하여 저장
        scenarioRoles = data.filter(i => typeof i === 'string');
        document.getElementById('scenario-status').innerText = `${f.split('.')} 적용됨 (${scenarioRoles.length})`;
    } catch { alert("JSON 파일을 찾을 수 없습니다. (서버/폴더 확인)"); }
}

function join() {
    const v = document.getElementById('nicknameInput').value.trim(); if(!v) return;
    myNick = v; document.getElementById('login-screen').classList.add('hidden');
    if (v.toUpperCase() === "GM") { isGM = true; localStorage.setItem('botc_isGM', 'true'); document.getElementById('gm-screen').classList.remove('hidden'); }
    else { localStorage.setItem('botc_nick', myNick); localStorage.setItem('botc_isGM', 'false'); db.ref('vote_game/players/' + myNick).update({ roleId: "", isDead: false, ghostVoteUsed: false, joinedAt: Date.now() }); document.getElementById('player-screen').classList.remove('hidden'); document.getElementById('my-name').innerText = myNick; }
    setupListeners();
}

function setupListeners() {
    db.ref('vote_game/players').on('value', s => { playersData = s.val() || {}; if (isGM) renderGMList(); else processPlayerRoleStatus(); });
    db.ref('vote_game/voting').on('value', s => { votingState = s.val() || { active: false }; handleVotingUI(); });
    db.ref('vote_game/lastAction').on('value', s => { const a = s.val(); if (a && a.ts > lastToastTs) { lastToastTs = a.ts; showToast(a.voter, a.type); } });
}

// GM: 직업 지정 팝업 (시나리오 필터링 적용)
function openRoleSelectModal(nick) {
    const grid = document.getElementById('role-grid'); grid.innerHTML = "";
    document.getElementById('role-select-target').innerText = `(${nick})`;
    // 시나리오가 있으면 해당 목록만, 없으면 전체 노출
    const displayList = scenarioRoles.length > 0 ? scenarioRoles : Object.keys(ROLE_DICT);
    
    displayList.forEach(id => {
        const info = ROLE_DICT[id] || { name: id, team: "알 수 없음" };
        grid.innerHTML += `<button onclick="assignRole('${nick}','${id}')" class="flex flex-col items-center justify-center p-4 bg-zinc-800 rounded-xl border border-zinc-700 hover:bg-zinc-700 transition"><span class="text-sm font-black text-white">${info.name}</span><span class="text-[9px] opacity-50">${info.team}</span></button>`;
    });
    document.getElementById('role-select-modal').classList.remove('hidden');
}

function assignRole(n, rid) { db.ref(`vote_game/players/${n}/roleId`).set(rid); closeRoleSelectModal(); }
function closeRoleSelectModal() { document.getElementById('role-select-modal').classList.add('hidden'); }

// 플레이어: 데이터 로드 및 팝업 제어
async function processPlayerRoleStatus() {
    const d = playersData[myNick]; if(!d || !d.roleId) return;
    const info = ROLE_DICT[d.roleId] || { name: d.roleId, team: "알 수 없음" };
    document.getElementById('my-role-name').innerText = info.name;
    document.getElementById('my-role-team').innerText = info.team;

    const btn = document.getElementById('btn-detail-guide');
    if (roleDetailCache[d.roleId] === undefined) {
        try { const res = await fetch(`./${d.roleId}.txt`); if(res.ok) roleDetailCache[d.roleId] = { av: true, tx: await res.text() }; else roleDetailCache[d.roleId] = { av: false }; }
        catch { roleDetailCache[d.roleId] = { av: false }; }
    }
    const cache = roleDetailCache[d.roleId];
    if (cache.av) { btn.disabled = false; btn.innerText = "📖 상세 가이드 읽기"; btn.className = "w-full mt-4 bg-zinc-700 text-amber-400 font-bold py-3 rounded-xl shadow-lg"; }
    else { btn.disabled = true; btn.innerText = "🚫 가이드 준비중"; btn.className = "w-full mt-4 bg-zinc-800 text-gray-600 font-bold py-3 rounded-xl cursor-not-allowed shadow-inner"; }
}

function autoFormatText(text) {
    let res = text.trim();
    const headers = ['요약', '진행 방법', '예시', '징크스 규칙', '등장 스크립트', '아티스트:'];
    headers.forEach(h => {
        const regex = new RegExp(`^(${h}.*?)$`, 'gm');
        res = res.replace(regex, '<hr class="border-zinc-700 my-4"><p class="text-lg font-black text-amber-400 mb-2">📌 $1</p>');
    });
    res = res.replace(/“([^”]*)”/g, '<blockquote class="border-l-4 border-amber-600 pl-3 my-3 text-amber-100 italic bg-black/20 p-2 rounded-r">“$1”</blockquote>');
    return res.replace(/\n/g, '<br>');
}

async function openAbilityPopup() {
    const d = playersData[myNick]; if(!d || !roleDetailCache[d.roleId]?.av) return;
    document.getElementById('modal-role-name').innerText = ROLE_DICT[d.roleId]?.name || d.roleId;
    // InnerHTML을 사용하여 📌 기호와 구분선이 정상 렌더링되게 수정
    document.getElementById('modal-role-text').innerHTML = autoFormatText(roleDetailCache[d.roleId].tx); 
    document.getElementById('ability-modal').classList.remove('hidden');
}

// 투표 로직 (object Object 오류 수정)
function startVote() {
    const target = document.getElementById('nomineeSelect').value; if (!target) return alert("피지명자 필수");
    // .map(e => e)로 이름만 추출하여 배열을 깔끔하게 만듬
    const sorted = Object.entries(playersData).sort((a, b) => a.joinedAt - b.joinedAt).map(e => e);
    const idx = sorted.indexOf(target);
    let order = []; for (let i = 1; i <= sorted.length; i++) order.push(sorted[(idx + i) % sorted.length]);
    db.ref('vote_game/voting').set({ active: true, target, nominator: document.getElementById('nominatorSelect').value || "없음", order, currentIndex: 0, yesCount: 0 });
}

function submitVote(t, ghost = false) {
    if (votingState.order[votingState.currentIndex] !== myNick) return;
    let up = {}; up['vote_game/voting/currentIndex'] = votingState.currentIndex + 1;
    if (t === 'yes') up['vote_game/voting/yesCount'] = (votingState.yesCount || 0) + 1;
    if (ghost) up[`vote_game/players/${myNick}/ghostVoteUsed`] = true;
    up['vote_game/lastAction'] = { voter: myNick, type: t, ts: Date.now() };
    db.ref().update(up);
}

function renderGMList() {
    const l = document.getElementById('gm-player-list'), n1 = document.getElementById('nominatorSelect'), n2 = document.getElementById('nomineeSelect');
    l.innerHTML = ""; n1.innerHTML = '<option value="">지명자 없음</option>'; n2.innerHTML = '<option value="">피지명자 선택</option>';
    Object.entries(playersData).sort((a,b)=>a.joinedAt-b.joinedAt).forEach(([nick, d], i) => {
        const kn = d.roleId ? (ROLE_DICT[d.roleId]?.name || d.roleId) : '직업 지정';
        l.innerHTML += `<div class="flex items-center gap-2 bg-zinc-900 p-2 rounded border border-zinc-700 ${d.isDead?'opacity-50':''}">
            <span class="text-xs bg-zinc-700 px-2 rounded">${i+1}</span><span class="flex-1 font-bold truncate">${nick}</span>
            <button onclick="openRoleSelectModal('${nick}')" class="bg-zinc-800 px-2 py-1.5 rounded text-xs border border-zinc-600 truncate w-24">${kn}</button>
            <button onclick="db.ref('vote_game/players/${nick}/isDead').set(${!d.isDead})" class="text-xs px-2 py-1.5 rounded font-bold ${d.isDead?'bg-slate-600':'bg-red-800'}">${d.isDead?'부활':'사망'}</button>
        </div>`;
        const op = `<option value="${nick}">${nick} (${i+1}번)</option>`; n1.innerHTML += op; n2.innerHTML += op;
    });
}

function handleVotingUI() {
    if (!votingState.active) return (document.getElementById('vote-area').classList.add('hidden'), document.getElementById('gm-result-panel').classList.add('hidden'));
    const o = votingState.order || [], i = votingState.currentIndex || 0, fin = i >= o.length, cur = fin ? "완료" : o[i];
    if (isGM) { 
        document.getElementById('gm-result-panel').classList.remove('hidden'); 
        document.getElementById('gm-yes-count').innerText = votingState.yesCount || 0; 
        document.getElementById('gm-current-voter').innerText = cur;
        document.getElementById('gm-final-decision').classList.toggle('hidden', !fin);
    } else {
        document.getElementById('vote-area').classList.remove('hidden');
        document.getElementById('vote-target').innerText = votingState.target;
        document.getElementById('vote-nominator-display').innerText = `지명자: ${votingState.nominator}`;
        const w = document.getElementById('vote-wait'), a = document.getElementById('vote-action'), g = document.getElementById('ghost-action');
        [w, a, g].forEach(e => e.classList.add('hidden'));
        if (fin) { w.classList.remove('hidden'); w.innerText = "모든 투표가 종료되었습니다."; }
        else if (cur === myNick) {
            const d = playersData[myNick] || {};
            if (d.isDead) d.ghostVoteUsed ? setTimeout(() => submitVote('pass'), 1500) : g.classList.remove('hidden');
            else a.classList.remove('hidden');
        } else { w.classList.remove('hidden'); document.getElementById('current-voter-name').innerText = cur; }
    }
}
function resetGame() { if(confirm("모든 데이터 초기화?")) db.ref('vote_game').remove().then(() => (localStorage.clear(), location.reload())); }
function closeAbilityPopup() { document.getElementById('ability-modal').classList.add('hidden'); }
function endVote(d) { alert(d === 'proceed' ? "처형 확정!" : "부결!"); db.ref('vote_game/voting').set({ active: false }); }
function showRole() { document.getElementById('tap-to-see').classList.add('hidden'); document.getElementById('role-details').classList.remove('hidden'); }
function hideRole() { document.getElementById('tap-to-see').classList.remove('hidden'); document.getElementById('role-details').classList.add('hidden'); }
function showToast(v, t) { const c = document.getElementById('toast-container'), i = document.createElement('div'); i.className = `toast-item ${t==='yes'?'bg-red-700 border-2 border-red-400':'bg-slate-700 border-2 border-slate-500'}`; i.innerHTML = `📢 <b>${v}</b>님이 ${t==='yes'?'✋ 찬성':'🤚 기권'}함`; c.appendChild(i); setTimeout(() => i.remove(), 3000); }
</script>
</body>
